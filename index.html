<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🌸 2026 東京櫻花探險</title>
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='white'/%3E%3Ctext y='75' x='10' font-size='70'%3E%F0%9F%8C%B8%3C/text%3E%3C/svg%3E">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">

  <style>
    :root { --sakura-pink: #ffb7c5; --deep-pink: #ff758c; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #fff5f7; color: #4a4a4a; padding-bottom: 110px; overflow-x: hidden; }
    
    /* 這是 CSS 繪製的櫻花裝飾，取代圖片 */
    .sakura-icon-css {
      width: 80px; height: 80px; background: white; border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      margin: 0 auto 15px; font-size: 50px;
      box-shadow: 0 4px 15px rgba(255, 182, 193, 0.3);
    }

    .hero-header { background: linear-gradient(135deg, #ffdeed 0%, #fff1eb 100%); border-radius: 0 0 40px 40px; position: relative; }
    .card-v2 { background: white; border-radius: 24px; box-shadow: 0 10px 25px rgba(255, 182, 193, 0.15); border: 1px solid rgba(255, 117, 140, 0.1); margin-bottom: 20px; overflow: hidden; }
    .time-pill { background: #fdf2f4; color: var(--deep-pink); padding: 2px 10px; border-radius: 8px; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
    .sakura-fall { position: fixed; top: -10%; pointer-events: none; z-index: 10; animation: fall linear forwards; }
    
    @keyframes fall { 
      0% { transform: translateY(0) rotate(0deg); opacity: 0; } 
      10% { opacity: 1; } 
      90% { opacity: 1; } 
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } 
    }
    
    .nav-bar { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-top: 1px solid rgba(255, 182, 193, 0.2); }
    .sos-btn { position: fixed; right: 20px; bottom: 120px; width: 60px; height: 60px; background: #ff4d6d; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; box-shadow: 0 8px 20px rgba(255, 77, 109, 0.3); z-index: 100; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
  </style>
</head>
<body>

  <div class="sos-btn" onclick="triggerSOS()">
    <i class="fas fa-bullhorn text-2xl"></i>
  </div>

  <div class="hero-header p-10 text-center shadow-sm relative">
    <div id="countdown" class="absolute top-4 right-4 text-[10px] bg-white/60 px-2 py-1 rounded-full text-pink-500 font-bold tracking-tighter"></div>
    
    <div class="sakura-icon-css animate-bounce">🌸</div>
    
    <h1 class="text-3xl font-bold text-pink-700">2026 東京櫻花季</h1>
    <p class="text-pink-400 font-light text-sm tracking-widest mt-1 italic">Family Trip | 04.04 - 04.09</p>
  </div>

  <div class="p-5">
    <div class="card-v2 p-6">
      <div class="flex justify-between items-center mb-4">
        <span class="bg-pink-500 text-white text-xs px-3 py-1 rounded-full font-bold">DAY 1 (4/4 六)</span>
        <span class="font-['Zhi_Mang_Xing'] text-pink-300 text-xl tracking-widest">啟程</span>
      </div>
      <h3 class="text-lg font-bold text-gray-700 mb-4"><i class="fas fa-plane-departure mr-2 text-pink-400"></i>星宇 JX802 ➔ 市川飯店</h3>
      <div class="space-y-4 border-l-2 border-pink-100 ml-2 pl-4">
        <div class="flex items-center"><span class="time-pill mr-3">10:40</span><span class="text-sm">桃園起飛</span></div>
        <div class="flex items-center"><span class="time-pill mr-3">17:30</span><span class="text-sm font-bold text-pink-600">抵達市川飯店</span></div>
      </div>
    </div>
    
    </div>

  <nav class="nav-bar fixed bottom-0 w-full flex justify-around py-4 pb-6 z-50 shadow-lg">
    <div onclick="window.scrollTo({top:0, behavior:'smooth'})" class="flex flex-col items-center text-pink-500">
      <i class="fas fa-calendar-alt text-xl"></i>
      <span class="text-[10px] font-bold mt-1">行程表</span>
    </div>
    <div onclick="openExchange()" class="flex flex-col items-center text-gray-400">
      <i class="fas fa-calculator text-xl"></i>
      <span class="text-[10px] font-bold mt-1">換台幣</span>
    </div>
  </nav>

  <script>
    function initCountdown() {
      const target = new Date('2026-04-04T00:00:00').getTime();
      function update() {
        const now = new Date().getTime();
        const diff = target - now;
        if (diff < 0) { document.getElementById('countdown').innerText = "旅途進行中！"; return; }
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById('countdown').innerText = `倒數 ${days} 天`;
      }
      update(); setInterval(update, 60000);
    }

    function triggerSOS() {
      const msg = new SpeechSynthesisUtterance('請幫幫我，我迷路了。');
      msg.lang = 'zh-TW';
      window.speechSynthesis.speak(msg);
      alert('🚨 SOS 已啟動！');
    }

    function openExchange() {
      let jpy = prompt("💴 輸入日幣：", "1000");
      if (jpy) alert(`大約台幣 ${Math.round(jpy * 0.21)} 元`);
    }

    function createSakura() {
      const petal = document.createElement('div');
      petal.innerHTML = '🌸';
      petal.className = 'sakura-fall text-pink-200';
      petal.style.left = Math.random() * 100 + 'vw';
      const duration = Math.random() * 5 + 7;
      petal.style.animationDuration = duration + 's';
      document.body.appendChild(petal);
      setTimeout(() => petal.remove(), duration * 1000);
    }

    initCountdown();
    setInterval(createSakura, 2000);
  </script>
</body>
</html>
