<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>🌸 2026 東京櫻花探險</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Zhi_Mang_Xing&display=swap" rel="stylesheet">

  <style>
    :root { --sakura-pink: #ffb7c5; --deep-pink: #ff758c; --soft-bg: #fff5f7; }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--soft-bg); padding-bottom: 140px; overflow-x: hidden; }
    
    /* 慢速 App 轉場動畫 */
    @keyframes slowAppEntrance {
      0% { opacity: 0; transform: translateY(30px); filter: blur(8px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    .tab-content { display: none; }
    .tab-content.active { 
      display: block; 
      animation: slowAppEntrance 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
    }

    .day-panel { display: none; }
    .day-panel.active { 
      display: block; 
      animation: slowAppEntrance 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
    }

    .anim-item { animation: slowAppEntrance 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* UI 元素 */
    .hero-header { background: linear-gradient(135deg, #ffdeed 0%, #fff1eb 100%); border-radius: 0 0 40px 40px; padding: 45px 20px 25px; text-align: center; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .header-logo { width: 75px; height: 75px; background: white; border-radius: 50%; margin: 0 auto 10px; padding: 10px; box-shadow: 0 8px 15px rgba(255,182,193,0.3); }
    
    .day-selector { display: flex; overflow-x: auto; gap: 12px; padding: 20px; scrollbar-width: none; }
    .day-btn { flex: 0 0 auto; width: 75px; height: 55px; border-radius: 25px; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
    .day-btn.active { background: var(--deep-pink); color: white; transform: translateY(-5px); box-shadow: 0 8px 15px rgba(255,117,140,0.3); }

    .card-v2 { background: white; border-radius: 25px; box-shadow: 0 8px 20px rgba(255,182,193,0.12); margin: 0 20px 15px; padding: 22px; border: 1px solid rgba(255,117,140,0.05); }
    
    /* 記帳專用樣式 */
    .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
    .cat-item { background: #fff; border: 2px solid transparent; border-radius: 15px; padding: 10px 5px; text-align: center; font-size: 12px; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .cat-item.active { border-color: var(--deep-pink); background: #fff0f3; transform: scale(1.05); }
    .cat-icon { font-size: 24px; display: block; margin-bottom: 4px; }

    .input-field { width: 100%; padding: 12px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 10px; font-size: 16px; outline: none; }
    .btn-main { background: var(--deep-pink); color: white; width: 100%; padding: 15px; border-radius: 20px; font-weight: bold; font-size: 18px; box-shadow: 0 5px 15px rgba(255,117,140,0.4); }
    
    .nav-bar { background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,182,193,0.2); }
    .nav-item { color: #ccc; }
    .nav-item.active { color: var(--deep-pink); }

    .speak-btn { background: var(--sakura-pink); color: white; width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
  </style>
</head>
<body>

  <div class="hero-header">
    <div id="countdown" class="absolute top-6 right-6 text-[10px] bg-white/80 px-3 py-1 rounded-full text-pink-500 font-bold tracking-wider"></div>
    <img src="https://image2url.com/r2/default/images/1772407854647-3d653eed-adf6-4e35-8c39-0fea89d1df0c.png" class="header-logo">
    <h1 class="text-xl font-bold text-pink-700 font-['Zhi_Mang_Xing']">2026 東京櫻花探險</h1>
  </div>

  <div id="tab-schedule" class="tab-content active">
    <div class="day-selector">
      <button class="day-btn active" onclick="switchDay(1, this)"><span class="text-[10px]">（六）</span><span class="text-lg font-bold">4/4</span></button>
      <button class="day-btn" onclick="switchDay(2, this)"><span class="text-[10px]">（日）</span><span class="text-lg font-bold">4/5</span></button>
      <button class="day-btn" onclick="switchDay(3, this)"><span class="text-[10px]">（一）</span><span class="text-lg font-bold">4/6</span></button>
      <button class="day-btn" onclick="switchDay(4, this)"><span class="text-[10px]">（二）</span><span class="text-lg font-bold">4/7</span></button>
      <button class="day-btn" onclick="switchDay(5, this)"><span class="text-[10px]">（三）</span><span class="text-lg font-bold">4/8</span></button>
      <button class="day-btn" onclick="switchDay(6, this)"><span class="text-[10px]">（四）</span><span class="text-lg font-bold">4/9</span></button>
    </div>
    <div id="schedule-panels">
        <div id="day-panel-1" class="day-panel active">
            <div class="card-v2">
                <h3 class="text-lg font-bold text-pink-600 mb-6 border-b border-pink-50 pb-2">🌸 Day 1：啟程</h3>
                <div class="space-y-6 text-sm">
                    <div class="flex items-start"><span class="bg-pink-50 text-pink-500 px-3 py-1 rounded-full font-bold mr-3">10:40</span><div><p class="font-bold">桃園機場起飛</p></div></div>
                    <div class="flex items-start"><span class="bg-pink-50 text-pink-500 px-3 py-1 rounded-full font-bold mr-3">15:05</span><div><p class="font-bold">抵達成田二航廈</p></div></div>
                    <div class="flex items-start"><span class="bg-pink-50 text-pink-500 px-3 py-1 rounded-full font-bold mr-3">17:30</span><div><p class="font-bold text-pink-600">入住：市川 R9 飯店</p></div></div>
                </div>
            </div>
        </div>
        <div id="day-panel-2" class="day-panel"><div class="card-v2">🌸 Day 2 行程內容</div></div>
        <div id="day-panel-3" class="day-panel"><div class="card-v2">🌸 Day 3 行程內容</div></div>
        <div id="day-panel-4" class="day-panel"><div class="card-v2 text-center py-10 text-gray-400">Day 4 行程內容規劃中</div></div>
        <div id="day-panel-5" class="day-panel"><div class="card-v2 text-center py-10 text-gray-400">Day 5 行程內容規劃中</div></div>
        <div id="day-panel-6" class="day-panel"><div class="card-v2 text-center py-10 text-gray-400">Day 6 準備返台</div></div>
    </div>
  </div>

  <div id="tab-help" class="tab-content">
    <div class="flex overflow-x-auto gap-2 px-5 py-4 scrollbar-none">
        <button class="cat-btn bg-white border border-pink-200 px-4 py-2 rounded-full font-bold text-pink-500 active" onclick="filterHelp('shopping', this)">🛍️ 購物</button>
        <button class="cat-btn bg-white border border-pink-200 px-4 py-2 rounded-full font-bold text-pink-500" onclick="filterHelp('tax', this)">💰 退稅</button>
        <button class="cat-btn bg-white border border-pink-200 px-4 py-2 rounded-full font-bold text-pink-500" onclick="filterHelp('food', this)">🍜 點餐</button>
    </div>
    <div id="help-list" class="mt-2"></div>
  </div>

  <div id="tab-exchange" class="tab-content">
    <div class="card-v2 mt-4 text-center">
      <h3 class="text-lg font-bold mb-4 text-gray-700">💴 即時換算 (0.21)</h3>
      <input type="number" id="jpy-input" placeholder="輸入日幣 ¥" class="w-full p-4 border rounded-2xl text-center text-2xl mb-4 bg-gray-50">
      <div id="tw-result" class="text-3xl font-black text-pink-600">NT$ 0</div>
    </div>

    <div class="card-v2">
        <h3 class="text-lg font-bold mb-4 text-gray-700">✍️ 簡易記帳</h3>
        
        <div class="cat-grid">
            <div class="cat-item active" onclick="selectRecordCat('💊', '藥妝', this)"><span class="cat-icon">💊</span>藥妝</div>
            <div class="cat-item" onclick="selectRecordCat('👕', '衣服', this)"><span class="cat-icon">👕</span>衣服</div>
            <div class="cat-item" onclick="selectRecordCat('🍱', '食物', this)"><span class="cat-icon">🍱</span>食物</div>
            <div class="cat-item" onclick="selectRecordCat('➕', '其他', this)"><span class="cat-icon">➕</span>其他</div>
        </div>

        <input type="text" id="rec-name" placeholder="買了什麼？(例: 合利他命)" class="input-field">
        
        <div class="flex gap-2 mb-4">
            <input type="number" id="rec-price" placeholder="金額" class="input-field mb-0 flex-1">
            <select id="rec-currency" class="bg-gray-50 border rounded-xl px-2 font-bold text-gray-600">
                <option value="JPY">日幣 ¥</option>
                <option value="TWD">台幣 $</option>
            </select>
        </div>

        <button onclick="addRecord()" class="btn-main">記一筆 🌸</button>
    </div>

    <div id="record-list-container" class="mb-10">
        <div class="px-6 flex justify-between items-end mb-2">
            <span class="font-bold text-gray-500">購物清單</span>
            <span id="total-sum" class="text-pink-600 font-black text-xl">總計: NT$ 0</span>
        </div>
        <div id="record-list"></div>
    </div>
  </div>

  <nav class="nav-bar fixed bottom-0 w-full flex justify-around py-4 pb-8 z-50">
    <div onclick="switchTab('schedule', this)" class="nav-item active flex flex-col items-center">
      <i class="fas fa-calendar-alt text-2xl"></i><span class="text-[10px] font-bold mt-1">行程表</span>
    </div>
    <div onclick="switchTab('help', this)" class="nav-item flex flex-col items-center">
      <i class="fas fa-comment-dots text-2xl"></i><span class="text-[10px] font-bold mt-1">日文求助</span>
    </div>
    <div onclick="switchTab('exchange', this)" class="nav-item flex flex-col items-center">
      <i class="fas fa-coins text-2xl"></i><span class="text-[10px] font-bold mt-1">匯率記帳</span>
    </div>
  </nav>

  <script>
    const EXCHANGE_RATE = 0.21;
    let records = JSON.parse(localStorage.getItem('travel_records')) || [];
    let selectedCat = { icon: '💊', name: '藥妝' };

    // 分頁切換
    function switchTab(tabId, el) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + tabId).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      el.classList.add('active');
      if(tabId === 'help') filterHelp('shopping', document.querySelector('.cat-btn'));
      if(tabId === 'exchange') renderRecords();
    }

    // 行程切換
    function switchDay(dayNum, el) {
      document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
      const target = document.getElementById('day-panel-' + dayNum);
      target.style.animation = 'none'; target.offsetHeight; target.style.animation = null;
      target.classList.add('active');
      document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      el.scrollIntoView({ behavior: 'smooth', inline: 'center' });
    }

    // 匯率換算
    document.getElementById('jpy-input').addEventListener('input', (e) => {
      const val = e.target.value;
      document.getElementById('tw-result').innerText = `NT$ ${Math.round(val * EXCHANGE_RATE).toLocaleString()}`;
    });

    // 選擇分類
    function selectRecordCat(icon, name, el) {
        selectedCat = { icon, name };
        document.querySelectorAll('.cat-item').forEach(item => item.classList.remove('active'));
        el.classList.add('active');
    }

    // 新增紀錄
    function addRecord() {
        const name = document.getElementById('rec-name').value || '未命名項目';
        const price = parseFloat(document.getElementById('rec-price').value);
        const curr = document.getElementById('rec-currency').value;

        if (!price) { alert('請輸入金額！'); return; }

        const twPrice = curr === 'JPY' ? Math.round(price * EXCHANGE_RATE) : price;
        const record = {
            id: Date.now(),
            catIcon: selectedCat.icon,
            catName: selectedCat.name,
            name: name,
            price: price,
            curr: curr,
            twPrice: twPrice
        };

        records.unshift(record); // 加到最前面
        saveAndRender();
        
        // 清空輸入
        document.getElementById('rec-name').value = '';
        document.getElementById('rec-price').value = '';
    }

    // 刪除紀錄
    function deleteRecord(id) {
        records = records.filter(r => r.id !== id);
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('travel_records', JSON.stringify(records));
        renderRecords();
    }

    function renderRecords() {
        const list = document.getElementById('record-list');
        const totalSumEl = document.getElementById('total-sum');
        let total = 0;

        list.innerHTML = records.map(r => {
            total += r.twPrice;
            return `
                <div class="card-v2 anim-item flex justify-between items-center py-4 mb-3">
                    <div class="flex items-center">
                        <span class="text-3xl mr-4">${r.catIcon}</span>
                        <div>
                            <p class="font-bold text-gray-700">${r.name}</p>
                            <p class="text-xs text-gray-400">${r.catName} | ${r.curr === 'JPY' ? '¥'+r.price : '$'+r.price}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-pink-600 font-black">NT$ ${r.twPrice}</p>
                        <button onclick="deleteRecord(${r.id})" class="text-gray-300 text-xs mt-1">刪除</button>
                    </div>
                </div>
            `;
        }).join('');

        totalSumEl.innerText = `總計: NT$ ${total.toLocaleString()}`;
    }

    // 初始求助資料
    const helpData = {
      shopping: [{ cn: "這個多少錢？", jp: "これはいくらですか？" }, { cn: "我要買這個。", jp: "これをください。" }],
      tax: [{ cn: "請問可以退稅嗎？", jp: "免税はできますか？" }],
      food: [{ cn: "結帳。", jp: "お会計をお願いします。" }]
    };

    function filterHelp(cat, btn) {
        const list = document.getElementById('help-list');
        list.innerHTML = '';
        setTimeout(() => {
            list.innerHTML = (helpData[cat] || []).map(item => `
                <div class="card-v2 anim-item flex justify-between items-center">
                    <div><p class="font-bold">${item.jp}</p><p class="text-xs text-pink-500 mt-1">${item.cn}</p></div>
                    <button class="speak-btn" onclick="playJP('${item.jp}')"><i class="fas fa-volume-up"></i></button>
                </div>
            `).join('');
        }, 10);
    }

    function playJP(text) {
      window.speechSynthesis.cancel();
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = 'ja-JP';
      msg.rate = 0.8;
      window.speechSynthesis.speak(msg);
    }

    function initCountdown() {
      const target = new Date('2026-04-04T00:00:00').getTime();
      const el = document.getElementById('countdown');
      setInterval(() => {
        const diff = target - new Date().getTime();
        el.innerText = diff < 0 ? "旅行中" : `出發倒數 ${Math.floor(diff / (1000*60*60*24))} 天`;
      }, 1000);
    }

    window.onload = () => {
      initCountdown();
      renderRecords();
    };
  </script>
</body>
</html>
