<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>🌸 2026 東京櫻花探險</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">

  <style>
    :root { --sakura-pink: #ffb7c5; --deep-pink: #ff758c; --soft-bg: #fff5f7; }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--soft-bg); color: #4a4a4a; padding-bottom: 110px; overflow-x: hidden; }
    
    .hero-header { background: linear-gradient(135deg, #ffdeed 0%, #fff1eb 100%); border-radius: 0 0 40px 40px; padding: 40px 20px 30px; position: relative; }
    .custom-sakura-img { width: 80px; height: 80px; background: white; border-radius: 50%; margin: 0 auto 10px; padding: 10px; box-shadow: 0 8px 20px rgba(255, 182, 193, 0.4); object-fit: contain; }

    /* 分頁顯示控制 */
    .tab-content { display: none; animation: fadeIn 0.4s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* 膠囊天數選擇器 */
    .day-selector { display: flex; overflow-x: auto; gap: 12px; padding: 10px 20px; scrollbar-width: none; }
    .day-btn { flex: 0 0 auto; width: 75px; height: 55px; border-radius: 25px; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid rgba(255,117,140,0.1); }
    .day-btn.active { background: var(--deep-pink); color: white; transform: scale(1.05); }

    /* 卡片樣式 */
    .card-v2 { background: white; border-radius: 25px; box-shadow: 0 10px 25px rgba(255, 182, 193, 0.1); margin: 15px 20px; padding: 20px; border: 1px solid rgba(255, 117, 140, 0.05); }
    .time-pill { background: #fdf2f4; color: var(--deep-pink); padding: 2px 10px; border-radius: 10px; font-weight: 700; font-size: 0.8rem; }

    /* 語音按鈕 */
    .speak-btn { background: var(--sakura-pink); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; transition: 0.2s; }
    .speak-btn:active { background: var(--deep-pink); transform: scale(0.9); }

    .nav-bar { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-top: 1px solid rgba(255, 182, 193, 0.2); }
    .nav-item { color: #ccc; transition: 0.3s; }
    .nav-item.active { color: var(--deep-pink); }
  </style>
</head>
<body>

  <div class="hero-header text-center">
    <img src="https://image2url.com/r2/default/images/1772407854647-3d653eed-adf6-4e35-8c39-0fea89d1df0c.png" class="custom-sakura-img">
    <h1 class="text-xl font-bold text-pink-700 font-['Zhi_Mang_Xing']">2026 東京櫻花探險</h1>
  </div>

  <div id="tab-schedule" class="tab-content active">
    <div class="day-selector mt-4">
      <button class="day-btn active" onclick="showDay(1, this)"><span class="text-[10px]">（六）</span><span class="text-lg font-bold">4/4</span></button>
      <button class="day-btn" onclick="showDay(2, this)"><span class="text-[10px]">（日）</span><span class="text-lg font-bold">4/5</span></button>
      <button class="day-btn" onclick="showDay(3, this)"><span class="text-[10px]">（一）</span><span class="text-lg font-bold">4/6</span></button>
      <button class="day-btn" onclick="showDay(4, this)"><span class="text-[10px]">（二）</span><span class="text-lg font-bold">4/7</span></button>
    </div>

    <div id="day-contents" class="mt-4">
      <div id="day1" class="day-detail active">
        <div class="card-v2">
          <h3 class="text-lg font-bold text-pink-600 mb-4 border-b pb-2">🌸 第一天：抵達</h3>
          <div class="space-y-4 text-sm">
            <div class="flex items-center"><span class="time-pill mr-3">10:40</span><span>桃園起飛 (JX802)</span></div>
            <div class="flex items-center"><span class="time-pill mr-3">15:05</span><span>抵達成田二航廈</span></div>
            <div class="flex items-center"><span class="time-pill mr-3">17:30</span><span class="font-bold">入住：市川 R9 飯店</span></div>
          </div>
        </div>
      </div>
      <div id="day2" class="day-detail hidden">
        <div class="card-v2"><h3 class="text-lg font-bold text-pink-600">🌸 第二天：目黑川賞櫻</h3><p class="mt-4 text-sm">10:30 中目黑櫻花隧道</p></div>
      </div>
    </div>
  </div>

  <div id="tab-help" class="tab-content">
    <div class="p-6">
      <h2 class="text-xl font-bold text-red-500 mb-4"><i class="fas fa-bullhorn mr-2"></i>語音求助卡</h2>
      <p class="text-xs text-gray-400 mb-6">點擊喇叭圖示可播放日文聲音</p>
      
      <div class="space-y-4">
        <div class="card-v2 !m-0 flex justify-between items-center">
          <div>
            <p class="text-lg font-bold">すみません、道に迷いました。</p>
            <p class="text-xs text-gray-500 mt-1">不好意思，我迷路了。</p>
          </div>
          <button class="speak-btn" onclick="playJP('すみません、道に迷いました。助けてください。')">
            <i class="fas fa-volume-up"></i>
          </button>
        </div>

        <div class="card-v2 !m-0 flex justify-between items-center">
          <div>
            <p class="text-lg font-bold">市川のホテルに行きたいです。</p>
            <p class="text-xs text-gray-500 mt-1">我想去位於「市川」的飯店。</p>
          </div>
          <button class="speak-btn" onclick="playJP('市川のホテルに行きたいです。')">
            <i class="fas fa-volume-up"></i>
          </button>
        </div>

        <div class="card-v2 !m-0 flex justify-between items-center">
          <div>
            <p class="text-lg font-bold">駅はどこですか？</p>
            <p class="text-xs text-gray-500 mt-1">請問火車站在哪裡？</p>
          </div>
          <button class="speak-btn" onclick="playJP('駅はどこですか？')">
            <i class="fas fa-volume-up"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="tab-exchange" class="tab-content">
    <div class="card-v2 mt-10 text-center">
      <h3 class="text-lg font-bold mb-4">💴 快速換算 (0.21)</h3>
      <input type="number" id="jpy-input" placeholder="輸入日幣金額" class="w-full p-4 border rounded-2xl text-center text-xl mb-4">
      <div id="tw-result" class="text-2xl font-black text-pink-600">約 NT$ 0 元</div>
    </div>
  </div>

  <nav class="nav-bar fixed bottom-0 w-full flex justify-around py-4 pb-8 z-50">
    <div onclick="switchTab('schedule', this)" class="nav-item active flex flex-col items-center">
      <i class="fas fa-calendar-alt text-2xl"></i><span class="text-[10px] font-bold mt-1">行程表</span>
    </div>
    <div onclick="switchTab('help', this)" class="nav-item flex flex-col items-center">
      <i class="fas fa-comment-dots text-2xl"></i><span class="text-[10px] font-bold mt-1">日文求助</span>
    </div>
    <div onclick="switchTab('exchange', this)" class="nav-item flex flex-col items-center">
      <i class="fas fa-coins text-2xl"></i><span class="text-[10px] font-bold mt-1">匯率</span>
    </div>
    <div onclick="window.open('https://line.me/')" class="nav-item flex flex-col items-center text-gray-300">
      <i class="fab fa-line text-2xl"></i><span class="text-[10px] font-bold mt-1">找領隊</span>
    </div>
  </nav>

  <script>
    // 分頁切換邏輯
    function switchTab(tabId, el) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + tabId).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      el.classList.add('active');
      window.scrollTo(0,0);
    }

    // 行程表天數切換
    function showDay(n, btn) {
      document.querySelectorAll('.day-detail').forEach(d => d.classList.add('hidden'));
      document.getElementById('day' + n).classList.remove('hidden');
      document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    // 播放日文語音 (Text-to-Speech)
    function playJP(text) {
      // 停止目前正在播放的聲音
      window.speechSynthesis.cancel();
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = 'ja-JP';
      msg.rate = 0.9; // 語速稍慢一點，讓日本人聽得更清楚
      window.speechSynthesis.speak(msg);
    }

    // 匯率即時換算
    document.getElementById('jpy-input')?.addEventListener('input', function(e) {
      const val = e.target.value;
      document.getElementById('tw-result').innerText = val ? `約 NT$ ${Math.round(val * 0.21)} 元` : `約 NT$ 0 元`;
    });
  </script>
</body>
</html>
