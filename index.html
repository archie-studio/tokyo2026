<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🌸 2026 東京櫻花探險 - 修正版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Zhi_Mang_Xing&display=swap" rel="stylesheet">
  <style>
    :root { --sakura-pink: #ffb7c5; --deep-pink: #ff758c; --soft-bg: #fff5f7; }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--soft-bg); padding-bottom: 120px; overflow-x: hidden; }
    .day-panel { display: none; }
    .day-panel.active { display: block; animation: fadeIn 0.8s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .timeline-dot-line { width: 2px; border-left: 2px dotted var(--sakura-pink); margin-left: 28px; height: 25px; opacity: 0.8; }
    #detail-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 20px; }
    .modal-box { background: white; border-radius: 30px; width: 100%; max-width: 360px; overflow: hidden; animation: popIn 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.27); }
    @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .day-selector { display: flex; overflow-x: auto; gap: 12px; padding: 20px; scrollbar-width: none; }
    .day-btn { flex: 0 0 auto; width: 70px; height: 60px; border-radius: 18px; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .day-btn.active { background: var(--deep-pink); color: white; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255,117,140,0.3); }
    .timeline-card { background: white; border-radius: 20px; padding: 15px; display: flex; align-items: center; box-shadow: 0 4px 12px rgba(255,182,193,0.1); }
    .time-badge { background: #fff0f3; color: var(--deep-pink); padding: 4px 8px; border-radius: 10px; font-weight: 800; font-size: 12px; min-width: 60px; text-align: center; }
  </style>
</head>
<body>

<div class="hero-header bg-gradient-to-br from-pink-100 to-orange-50 p-10 rounded-b-[40px] text-center">
  <h1 class="text-2xl font-bold text-pink-700 font-['Zhi_Mang_Xing']">2026 東京櫻花探險</h1>
</div>

<div class="day-selector">
  <button class="day-btn active" onclick="switchDay(1, this)"><span class="text-[10px]">4/4</span><span class="font-bold">SAT</span></button>
  <button class="day-btn" onclick="switchDay(2, this)"><span class="text-[10px]">4/5</span><span class="font-bold">SUN</span></button>
  <button class="day-btn" onclick="switchDay(3, this)"><span class="text-[10px]">4/6</span><span class="font-bold">MON</span></button>
  <button class="day-btn" onclick="switchDay(4, this)"><span class="text-[10px]">4/7</span><span class="font-bold">TUE</span></button>
  <button class="day-btn" onclick="switchDay(5, this)"><span class="text-[10px]">4/8</span><span class="font-bold">WED</span></button>
  <button class="day-btn" onclick="switchDay(6, this)"><span class="text-[10px]">4/9</span><span class="font-bold">THU</span></button>
</div>

<div id="schedule-container" class="px-5">
  <div id="day-panel-1" class="day-panel active">
    <div class="text-pink-600 font-bold mb-4 ml-1">🌸 抵達與目黑川夜櫻</div>
    <div class="timeline-card" onclick="openDetail('15:05', '🛬 抵達成田機場', '領好行李，深吸一口日本的空氣！準備搭乘火車。', 'Narita Airport', 'https://images.unsplash.com/photo-1571738221873-16298647565d?w=800')">
      <span class="time-badge">15:05</span><div class="ml-4 font-bold text-gray-700">抵達成田機場</div>
    </div>
    <div class="timeline-dot-line"></div>
    <div class="timeline-card" onclick="openDetail('18:45', '🌸 目黑川賞櫻', '迎接我們的是夢幻的夜櫻隧道。', 'Meguro River Cherry Blossoms', 'https://images.unsplash.com/photo-1528114039593-4366cc08227d?w=800')">
      <span class="time-badge">18:45</span><div class="ml-4 font-bold text-gray-700">目黑川賞夜櫻</div>
    </div>
  </div>

  <div id="day-panel-3" class="day-panel">
    <div class="text-pink-600 font-bold mb-4 ml-1">🌊 鎌倉江之島包車</div>
    <div class="timeline-card" onclick="openDetail('13:51', '🚃 江之電體驗', '搭乘充滿復古風情的江之電。▲ 讓包車司機在下一站等候，全家一起體驗一段經典的海線鐵道！', 'Kamakura Enoden', 'https://images.unsplash.com/photo-1577717903333-e8869c3a3793?w=800')">
      <span class="time-badge">13:51</span><div class="ml-4 font-bold text-gray-700">江之電體驗</div>
    </div>
    <div class="timeline-dot-line"></div>
    <div class="timeline-card" onclick="openDetail('14:06', '📸 鎌倉高校前', '灌籃高手經典平交道拍照打卡。(停留 20 分鐘)', 'Kamakura High School Crosswalk', 'https://images.unsplash.com/photo-1594917631388-b2ac7488f28d?w=800')">
      <span class="time-badge">14:06</span><div class="ml-4 font-bold text-gray-700">高校前平交道</div>
    </div>
  </div>
  
  </div>

<div id="detail-modal" onclick="closeDetail()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <img id="m-img" src="" class="w-full h-48 object-cover">
    <div class="p-6">
      <div class="flex justify-between items-center mb-3">
        <h2 id="m-title" class="text-xl font-bold text-gray-800"></h2>
        <span id="m-time" class="text-pink-500 font-bold text-sm"></span>
      </div>
      <p id="m-desc" class="text-gray-600 text-sm leading-relaxed mb-6"></p>
      <a id="m-map" href="" target="_blank" class="block w-full bg-blue-500 text-white text-center py-4 rounded-xl font-bold shadow-lg">
        <i class="fas fa-location-dot mr-2"></i> 打開 Google 地圖
      </a>
    </div>
  </div>
</div>

<nav class="fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t flex justify-around py-4 pb-8 z-[999]">
  <div class="text-pink-500 flex flex-col items-center"><i class="fas fa-calendar-alt text-2xl"></i><span class="text-[10px] font-bold">行程表</span></div>
  <div class="text-gray-300 flex flex-col items-center"><i class="fas fa-comment-dots text-2xl"></i><span class="text-[10px] font-bold">日文求助</span></div>
  <div class="text-gray-300 flex flex-col items-center"><i class="fas fa-coins text-2xl"></i><span class="text-[10px] font-bold">匯率記帳</span></div>
</nav>

<script>
  function switchDay(dayNum, el) {
    document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
    const target = document.getElementById('day-panel-' + dayNum);
    if(target) target.classList.add('active');
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
  }

  function openDetail(time, title, desc, mapSearch, imgUrl) {
    document.getElementById('m-time').innerText = time;
    document.getElementById('m-title').innerText = title;
    document.getElementById('m-desc').innerText = desc;
    document.getElementById('m-img').src = imgUrl;
    // 修正後的地圖連結語法
    document.getElementById('m-map').href = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(mapSearch);
    document.getElementById('detail-modal').style.display = 'flex';
  }

  function closeDetail() {
    document.getElementById('detail-modal').style.display = 'none';
  }
</script>
</body>
</html>
