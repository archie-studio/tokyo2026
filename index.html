<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🌸 2026 東京櫻花探險</title>
  
  <link rel="icon" type="image/png" href="https://image2url.com/r2/default/images/1772407854647-3d653eed-adf6-4e35-8c39-0fea89d1df0c.png">
  <link rel="apple-touch-icon" href="https://image2url.com/r2/default/images/1772407854647-3d653eed-adf6-4e35-8c39-0fea89d1df0c.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">

  <style>
    :root { --sakura-pink: #ffb7c5; --deep-pink: #ff758c; --soft-bg: #fff5f7; }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--soft-bg); color: #4a4a4a; padding-bottom: 110px; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
    
    .hero-header { background: linear-gradient(135deg, #ffdeed 0%, #fff1eb 100%); border-radius: 0 0 40px 40px; padding: 40px 20px 30px; position: relative; }
    .custom-sakura-img { width: 90px; height: 90px; background: white; border-radius: 50%; margin: 0 auto 15px; padding: 10px; box-shadow: 0 8px 20px rgba(255, 182, 193, 0.4); object-fit: contain; }

    /* 圓角矩形（膠囊型）天數選擇器 */
    .day-selector { display: flex; overflow-x: auto; gap: 15px; padding: 20px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .day-selector::-webkit-scrollbar { display: none; }
    
    .day-btn { 
      flex: 0 0 auto; 
      width: 80px; 
      height: 60px; 
      border-radius: 30px; 
      background: white; 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
      box-shadow: 0 4px 12px rgba(255,182,193,0.15); 
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
      border: 1px solid rgba(255, 117, 140, 0.05);
    }
    
    .day-btn.active { 
      background: var(--deep-pink); 
      color: white; 
      transform: translateY(-5px) scale(1.05); 
      box-shadow: 0 12px 25px rgba(255, 117, 140, 0.4); 
    }

    /* 內容動畫與樣式 */
    .schedule-content { display: none; animation: fadeInBlur 0.6s ease-out forwards; }
    .schedule-content.active { display: block; }
    @keyframes fadeInBlur { 
      from { opacity: 0; transform: scale(0.95); filter: blur(5px); } 
      to { opacity: 1; transform: scale(1); filter: blur(0); } 
    }

    .card-v2 { background: white; border-radius: 30px; box-shadow: 0 15px 35px rgba(255, 182, 193, 0.15); border: 1px solid rgba(255, 117, 140, 0.1); margin-bottom: 20px; overflow: hidden; padding: 25px; }
    .time-pill { background: #fdf2f4; color: var(--deep-pink); padding: 3px 12px; border-radius: 12px; font-weight: 700; font-size: 0.85rem; }
    
    /* 導覽列 */
    .nav-bar { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 182, 193, 0.2); }
    
    /* 求助彈窗樣式 */
    #sos-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; backdrop-filter: blur(8px); }
    .sos-card { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; background: white; border-radius: 35px; padding: 30px 20px; text-align: center; }
    .help-box { background: #fff5f7; border-left: 5px solid var(--deep-pink); padding: 15px; margin-bottom: 15px; text-align: left; border-radius: 15px; }
    
    .sakura-fall { position: fixed; top: -10%; pointer-events: none; z-index: 10; animation: fall linear forwards; }
    @keyframes fall { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 10% { opacity: 0.8; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
  </style>
</head>
<body>

  <div id="sos-overlay">
    <div class="sos-card">
      <h3 class="text-xl font-bold text-red-500 mb-4"><i class="fas fa-exclamation-circle mr-2"></i>緊急求助卡</h3>
      <div class="help-box">
        <p class="text-lg font-bold">すみません、道に迷いました。</p>
        <p class="text-xs text-gray-500">不好意思，我迷路了。</p>
      </div>
      <div class="help-box">
        <p class="text-lg font-bold">「市川」のホテルに行きたいです。</p>
        <p class="text-xs text-gray-500">我想回位於「市川」的飯店。</p>
      </div>
      <button onclick="closeSOS()" class="w-full mt-4 py-3 bg-gray-100 rounded-full font-bold text-gray-400">關閉</button>
    </div>
  </div>

  <div class="hero-header text-center shadow-sm">
    <div id="countdown" class="absolute top-6 right-6 text-[10px] bg-white/70 px-3 py-1 rounded-full text-pink-500 font-bold tracking-wider"></div>
    <img src="https://image2url.com/r2/default/images/1772407854647-3d653eed-adf6-4e35-8c39-0fea89d1df0c.png" class="custom-sakura-img">
    <h1 class="text-2xl font-bold text-pink-700 tracking-tight">2026 東京櫻花探險</h1>
  </div>

  <div class="day-selector">
    <button class="day-btn active" onclick="showDay(1, this)"><span class="text-xs font-bold mb-1">（六）</span><span class="text-lg font-black">4/4</span></button>
    <button class="day-btn" onclick="showDay(2, this)"><span class="text-xs font-bold mb-1">（日）</span><span class="text-lg font-black">4/5</span></button>
    <button class="day-btn" onclick="showDay(3, this)"><span class="text-xs font-bold mb-1">（一）</span><span class="text-lg font-black">4/6</span></button>
    <button class="day-btn" onclick="showDay(4, this)"><span class="text-xs font-bold mb-1">（二）</span><span class="text-lg font-black">4/7</span></button>
    <button class="day-btn" onclick="showDay(5, this)"><span class="text-xs font-bold mb-1">（三）</span><span class="text-lg font-black">4/8</span></button>
    <button class="day-btn" onclick="showDay(6, this)"><span class="text-xs font-bold mb-1">（四）</span><span class="text-lg font-black">4/9</span></button>
  </div>

  <div class="px-6 py-2">
    <div id="day1" class="schedule-content active">
      <div class="card-v2">
        <h3 class="text-2xl font-bold text-pink-600 mb-6 font-['Zhi_Mang_Xing'] border-b border-pink-50 pb-2">🌸 啟程：前進東京</h3>
        <div class="space-y-6">
          <div class="flex items-start"><span class="time-pill mr-4">10:40</span><div><p class="font-bold">桃園機場起飛</p><p class="text-xs text-gray-400">JX802</p></div></div>
          <div class="flex items-start"><span class="time-pill mr-4">15:05</span><div><p class="font-bold">抵達成田二航廈</p></div></div>
          <div class="flex items-start"><span class="time-pill mr-4">17:30</span><div><p class="font-bold text-pink-600">入住：市川飯店</p></div></div>
        </div>
      </div>
    </div>

    <div id="day2" class="schedule-content">
      <div class="card-v2">
        <h3 class="text-2xl font-bold text-pink-600 mb-6 font-['Zhi_Mang_Xing'] border-b border-pink-50 pb-2">🌸 目黑川與淺草</h3>
        <div class="space-y-6">
          <div class="flex items-start"><span class="time-pill mr-4">10:30</span><div><p class="font-bold">中目黑：目黑川賞櫻隧道</p></div></div>
          <div class="flex items-start"><span class="time-pill mr-4">18:30</span><div><p class="font-bold">淺草寺參拜、雷門夜色</p></div></div>
        </div>
      </div>
    </div>

    <div id="day3" class="schedule-content">
      <div class="card-v2">
        <h3 class="text-2xl font-bold text-pink-600 mb-6 font-['Zhi_Mang_Xing'] border-b border-pink-50 pb-2">🌸 明治神宮與澀谷</h3>
        <div class="space-y-6">
          <div class="flex items-start"><span class="time-pill mr-4">11:00</span><div><p class="font-bold">明治神宮散策</p></div></div>
          <div class="flex items-start"><span class="time-pill mr-4">16:00</span><div><p class="font-bold">澀谷十字路口看小八</p></div></div>
        </div>
      </div>
    </div>

    <div id="day4" class="schedule-content"><div class="card-v2 text-center py-10 text-gray-400">Day 4 行程規劃中...</div></div>
    <div id="day5" class="schedule-content"><div class="card-v2 text-center py-10 text-gray-400">Day 5 行程規劃中...</div></div>
    <div id="day6" class="schedule-content"><div class="card-v2 text-center py-10 text-gray-400">Day 6 準備返台</div></div>
  </div>

  <nav class="nav-bar fixed bottom-0 w-full flex justify-around py-4 pb-8 z-50">
    <div onclick="window.scrollTo({top:0, behavior:'smooth'})" class="flex flex-col items-center text-pink-500">
      <i class="fas fa-calendar-day text-2xl"></i>
      <span class="text-[10px] font-bold mt-1 tracking-widest">行程表</span>
    </div>
    <div onclick="openSOS()" class="flex flex-col items-center text-red-400">
      <div class="bg-red-50 p-2 rounded-full -mt-4 mb-1 shadow-inner"><i class="fas fa-bullhorn text-2xl"></i></div>
      <span class="text-[10px] font-bold tracking-widest">日文求助</span>
    </div>
    <div onclick="openExchange()" class="flex flex-col items-center text-gray-300">
      <i class="fas fa-yen-sign text-2xl"></i>
      <span class="text-[10px] font-bold mt-1 tracking-widest">匯率</span>
    </div>
    <div onclick="window.open('https://line.me/')" class="flex flex-col items-center text-gray-300">
      <i class="fab fa-line text-2xl"></i>
      <span class="text-[10px] font-bold mt-1 tracking-widest">領隊</span>
    </div>
  </nav>

  <script>
    function showDay(dayNum, btn) {
      document.querySelectorAll('.schedule-content').forEach(c => c.classList.remove('active'));
      document.getElementById('day' + dayNum).classList.add('active');
      document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }

    function openSOS() { document.getElementById('sos-overlay').style.display = 'block'; }
    function closeSOS() { document.getElementById('sos-overlay').style.display = 'none'; }

    function initCountdown() {
      const target = new Date('2026-04-04T00:00:00').getTime();
      const el = document.getElementById('countdown');
      function update() {
        const diff = target - new Date().getTime();
        el.innerText = diff < 0 ? "旅途開始！" : `倒數 ${Math.floor(diff / (1000 * 60 * 60 * 24))} 天`;
      }
      update(); setInterval(update, 60000);
    }

    function openExchange() {
      let jpy = prompt("💴 請輸入日幣金額：", "1000");
      if (jpy) alert(`預估匯率 0.21：\n日幣 ${jpy} ≈ 台幣 ${Math.round(jpy * 0.21)} 元`);
    }

    function createSakura() {
      const p = document.createElement('div');
      p.innerHTML = '🌸';
      p.className = 'sakura-fall text-pink-200';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.fontSize = (Math.random() * 10 + 12) + 'px';
      const dur = Math.random() * 5 + 7;
      p.style.animationDuration = dur + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), dur * 1000);
    }

    initCountdown();
    setInterval(createSakura, 2000);
  </script>
</body>
</html>
