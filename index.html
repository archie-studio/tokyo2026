<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>🌸 2026 東京櫻花探險</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Zhi_Mang_Xing&display=swap" rel="stylesheet">

  <style>
    :root { --sakura-pink: #ffb7c5; --deep-pink: #ff758c; --soft-bg: #fff5f7; }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--soft-bg); padding-bottom: 140px; overflow-x: hidden; }
    
    @keyframes slowAppEntrance {
      0% { opacity: 0; transform: translateY(30px); filter: blur(8px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    /* 彈窗出現動畫 */
    @keyframes modalFadeIn {
      from { opacity: 0; transform: translate(-50%, -45%) scale(0.95); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    .tab-content, .day-panel { display: none; }
    .tab-content.active, .day-panel.active { 
      display: block; 
      animation: slowAppEntrance 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
    }

    .timeline-dots { margin-left: 55px; height: 30px; border-left: 6px dotted #ffccd5; margin-top: -5px; margin-bottom: 5px; }

    /* 彈窗專屬樣式 */
    #detail-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 1000; }
    #detail-modal { 
      display: none; position: fixed; top: 50%; left: 50%; width: 85%; max-width: 400px; 
      background: white; border-radius: 30px; overflow: hidden; z-index: 1001; 
      animation: modalFadeIn 0.3s ease-out forwards;
    }
    .modal-img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
    .modal-close { position: absolute; top: 15px; right: 15px; width: 35px; height: 35px; background: rgba(255,255,255,0.8); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #333; cursor: pointer; }
    .nav-btn { background: #4285F4; color: white; width: 100%; padding: 15px; border-radius: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: bold; margin-top: 15px; text-decoration: none; }

    /* 3.0 基礎視覺樣式 */
    .hero-header { background: linear-gradient(135deg, #ffdeed 0%, #fff1eb 100%); border-radius: 0 0 40px 40px; padding: 45px 20px 25px; text-align: center; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .header-logo { width: 75px; height: 75px; background: white; border-radius: 50%; margin: 0 auto 10px; padding: 10px; box-shadow: 0 8px 15px rgba(255,182,193,0.3); }
    .day-selector { display: flex; overflow-x: auto; gap: 10px; padding: 20px; scrollbar-width: none; }
    .day-btn { flex: 0 0 auto; padding: 8px 20px; border-radius: 50px; background: white; border: 1px solid #ffdeed; color: #ff758c; font-weight: bold; min-width: 90px; transition: 0.3s; }
    .day-btn.active { background: #d15d5d; color: white; border-color: #d15d5d; }
    .card-v2 { background: white; border-radius: 25px; box-shadow: 0 8px 20px rgba(255,182,193,0.12); margin: 0 20px 0px; padding: 22px; cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,117,140,0.05); }
    .card-v2:active { transform: scale(0.97); }
    .time-tag { color: var(--deep-pink); font-weight: 800; font-size: 14px; margin-right: 10px; display: inline-block; background: #fff0f3; padding: 2px 8px; border-radius: 8px; }
    .card-title { font-weight: bold; color: #333; font-size: 17px; }
    .card-desc { color: #666; font-size: 14px; margin-top: 8px; line-height: 1.6; border-top: 1px dotted #eee; padding-top: 8px; }
    .cat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px; }
    .cat-item { background: #fff; border: 2px solid #fdf2f4; border-radius: 18px; padding: 10px 2px; text-align: center; font-size: 11px; }
    .cat-item.active { border-color: var(--deep-pink); background: #fff0f3; }
    .input-field { width: 100%; padding: 14px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 12px; font-size: 16px; outline: none; background: #fafafa; }
    .nav-bar { background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,182,193,0.2); }
    .nav-item { color: #ccc; }
    .nav-item.active { color: var(--deep-pink); }
  </style>
</head><body>
  <div id="detail-modal-overlay" onclick="closeModal()"></div>
  <div id="detail-modal">
    <div class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></div>
    <img id="m-img" src="" class="modal-img">
    <div class="p-6">
      <h3 id="m-title" class="text-xl font-bold text-gray-800 mb-2"></h3>
      <p id="m-desc" class="text-gray-600 text-sm leading-relaxed mb-4"></p>
      <a id="m-nav" href="#" target="_blank" class="nav-btn">
        <i class="fas fa-location-arrow"></i> 開啟 Google 地圖導航
      </a>
    </div>
  </div>

  <div class="hero-header">
    <div id="countdown" class="absolute top-6 right-6 text-[10px] bg-white/80 px-3 py-1 rounded-full text-pink-500 font-bold tracking-wider"></div>
    <img src="https://image2url.com/r2/default/images/1772407854647-3d653eed-adf6-4e35-8c39-0fea89d1df0c.png" class="header-logo">
    <h1 class="text-xl font-bold text-pink-700 font-['Zhi_Mang_Xing']">2026 東京櫻花探險</h1>
  </div><div id="tab-schedule" class="tab-content active">
    <div class="day-selector">
      <button class="day-btn active" onclick="switchDay(1, this)">4/4 (六)</button>
      <button class="day-btn" onclick="switchDay(2, this)">4/5 (日)</button>
      <button class="day-btn" onclick="switchDay(3, this)">4/6 (一)</button>
      <button class="day-btn" onclick="switchDay(4, this)">4/7 (二)</button>
      <button class="day-btn" onclick="switchDay(5, this)">4/8 (三)</button>
      <button class="day-btn" onclick="switchDay(6, this)">4/9 (四)</button>
    </div>
    
    <div id="schedule-panels">
        <div id="day-panel-1" class="day-panel active">
          <div class="card-v2" onclick="showDetail('成田機場', '抵達成田機場第二航廈。建議先前往 JR 東日本服務中心購買票券或辦理交通卡。', 'narita', 'https://images.unsplash.com/photo-1570710891163-6d3b5c47248b?w=500')">
            <div><span class="time-tag">15:05</span><span class="card-title">抵達成田機場</span></div>
            <p class="card-desc">抵達東京成田機場，準備展開賞櫻之旅。</p>
          </div>
          <div class="timeline-dots"></div>
          <div class="card-v2" onclick="showDetail('Hotel R9 Premium', '鄰近市川站，生活機能與交通皆便利，是舒適的連鎖飯店。', 'hotelr9', 'https://images.unsplash.com/photo-1566073771259-6a8506099945?w=500')">
            <div><span class="time-tag">17:15</span><span class="card-title">飯店 Check-in</span></div>
            <p class="card-desc">入住 HOTEL R9 Premium Ichikawa，稍作休息。</p>
          </div>
          <div class="timeline-dots"></div>
          <div class="card-v2" onclick="showDetail('中目黑夜櫻', '目黑川兩岸盛開的櫻花與紅燈籠相映，是東京最迷人的夜櫻勝地。', 'nakameguro', 'https://images.unsplash.com/photo-1524413840807-0c3cb6fa808d?w=500')">
            <div><span class="time-tag">18:45</span><span class="card-title">中目黑賞夜櫻</span></div>
            <p class="card-desc">漫步目黑川，欣賞粉色隧道般的夢幻夜櫻。</p>
          </div>
        </div>

        <div id="day-panel-2" class="day-panel">
          <div class="card-v2" onclick="showDetail('淺草雷門', '東京最古老的寺院，巨大的紅燈籠是必拍景點。', 'asakusa', 'https://images.unsplash.com/photo-1542931237-323a1959446a?w=500')">
            <div><span class="time-tag">09:40</span><span class="card-title">淺草雷門參拜</span></div>
            <p class="card-desc">遊覽仲見世通、淺草寺。</p>
          </div>
          <div class="timeline-dots"></div>
          <div class="card-v2" onclick="showDetail('上野公園', '東京賞櫻百選名所，擁有超過千株櫻花。', 'ueno', 'https://images.unsplash.com/photo-1504198453319-5ce911bafcde?w=500')">
            <div><span class="time-tag">14:00</span><span class="card-title">上野恩賜公園</span></div>
            <p class="card-desc">漫步於上野公園，欣賞櫻花百選勝地。</p>
          </div>
        </div>
        </div>
  </div><div id="tab-help" class="tab-content">
    <div class="flex overflow-x-auto gap-2 px-5 py-4 scrollbar-none">
        <button class="cat-btn bg-pink-500 text-white px-5 py-2 rounded-full font-bold whitespace-nowrap" onclick="filterHelp('shopping', this)">🛍️ 購物</button>
        <button class="cat-btn bg-white border border-pink-200 px-5 py-2 rounded-full font-bold text-pink-500 whitespace-nowrap" onclick="filterHelp('tax', this)">💰 退稅</button>
        <button class="cat-btn bg-white border border-pink-200 px-5 py-2 rounded-full font-bold text-pink-500 whitespace-nowrap" onclick="filterHelp('food', this)">🍜 點餐</button>
        <button class="cat-btn bg-white border border-pink-200 px-5 py-2 rounded-full font-bold text-pink-500 whitespace-nowrap" onclick="filterHelp('find', this)">🚻 設施</button>
        <button class="cat-btn bg-white border border-pink-200 px-5 py-2 rounded-full font-bold text-pink-500 whitespace-nowrap" onclick="filterHelp('sos', this)">🚑 緊急</button>
        <button class="cat-btn bg-white border border-pink-200 px-5 py-2 rounded-full font-bold text-pink-500 whitespace-nowrap" onclick="filterHelp('polite', this)">🤝 禮貌</button>
    </div>
    <div id="help-list" class="mt-2 px-1"></div>
  </div>

  <div id="tab-exchange" class="tab-content">
    <div class="card-v2 mt-4 text-center">
      <h3 class="text-lg font-bold mb-3 text-gray-700">💴 匯率換算 (0.21)</h3>
      <input type="number" id="jpy-input" placeholder="輸入日幣 ¥" class="w-full p-4 border rounded-2xl text-center text-3xl font-bold bg-pink-50/30 text-pink-600 outline-none">
      <div id="tw-result" class="text-xl text-center mt-3 text-gray-500 font-bold">約 NT$ 0 元</div>
    </div>
    <div class="card-v2">
        <h3 class="text-lg font-bold mb-4 text-gray-700">✍️ 簡易記帳</h3>
        <div class="cat-grid">
            <div class="cat-item active" onclick="selectRecordCat('💊', '藥妝', this)"><span class="block text-xl">💊</span>藥妝</div>
            <div class="cat-item" onclick="selectRecordCat('🍱', '美食', this)"><span class="block text-xl">🍱</span>美食</div>
            <div class="cat-item" onclick="selectRecordCat('🚌', '交通', this)"><span class="block text-xl">🚌</span>交通</div>
            <div class="cat-item" onclick="selectRecordCat('🎁', '紀念品', this)"><span class="block text-xl">🎁</span>紀念品</div>
            <div class="cat-item" onclick="selectRecordCat('➕', '其他', this)"><span class="block text-xl">➕</span>其他</div>
        </div>
        <input type="text" id="rec-name" placeholder="商品名稱" class="input-field">
        <div class="flex gap-2 mb-4">
            <input type="number" id="rec-price" placeholder="金額" class="input-field mb-0 flex-1">
            <select id="rec-currency" class="bg-gray-100 rounded-xl px-2 font-bold outline-none border-none">
                <option value="JPY">日幣 ¥</option>
                <option value="TWD">台幣 $</option>
            </select>
        </div>
        <button onclick="addRecord()" class="w-full bg-pink-500 text-white py-4 rounded-2xl font-bold shadow-lg">加入清單 🌸</button>
    </div>
    <div id="record-list-container" class="mb-10 px-6 mt-6">
        <div class="flex justify-between items-end mb-3"><span class="font-bold text-gray-400 text-sm">我的清單</span><span id="total-sum" class="text-pink-600 font-black text-2xl">NT$ 0</span></div>
        <div id="record-list"></div>
    </div>
  </div>

  <nav class="nav-bar fixed bottom-0 w-full flex justify-around py-4 pb-8 z-50">
    <div onclick="switchTab('schedule', this)" class="nav-item active flex flex-col items-center">
      <i class="fas fa-calendar-alt text-2xl"></i><span class="text-[10px] font-bold mt-1">行程表</span>
    </div>
    <div onclick="switchTab('help', this)" class="nav-item flex flex-col items-center">
      <i class="fas fa-comment-dots text-2xl"></i><span class="text-[10px] font-bold mt-1">日文求助</span>
    </div>
    <div onclick="switchTab('exchange', this)" class="nav-item flex flex-col items-center">
      <i class="fas fa-coins text-2xl"></i><span class="text-[10px] font-bold mt-1">匯率記帳</span>
    </div>
    <div onclick="window.open('https://line.me/')" class="nav-item flex flex-col items-center text-green-500">
      <i class="fab fa-line text-2xl"></i><span class="text-[10px] font-bold mt-1">找領隊</span>
    </div>
  </nav><script>
    const EXCHANGE_RATE = 0.21;
    let records = JSON.parse(localStorage.getItem('tokyo_records')) || [];
    let selectedCat = { icon: '💊', name: '藥妝' };

    // 彈窗地點導航庫
    const LOCATIONS = {
      narita: "Narita+Airport",
      hotelr9: "HOTEL+R9+Premium+Ichikawa+Ekimae",
      nakameguro: "Nakameguro+Park",
      asakusa: "Senso-ji",
      ueno: "Ueno+Park"
    };

    // 1. 彈窗顯示與關閉
    function showDetail(title, desc, locKey, imgUrl) {
      document.getElementById('m-title').innerText = title;
      document.getElementById('m-desc').innerText = desc;
      document.getElementById('m-img').src = imgUrl;
      // 修正後的導航連結
      document.getElementById('m-nav').href = `https://www.google.com/maps/search/?api=1&query=${LOCATIONS[locKey]}`;
      
      document.getElementById('detail-modal-overlay').style.display = 'block';
      document.getElementById('detail-modal').style.display = 'block';
    }

    function closeModal() {
      document.getElementById('detail-modal-overlay').style.display = 'none';
      document.getElementById('detail-modal').style.display = 'none';
    }

    // 2. 切換分頁與日期
    function switchTab(tabId, el) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + tabId).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      el.classList.add('active');
      if(tabId === 'help') filterHelp('shopping', document.querySelector('.cat-btn'));
      if(tabId === 'exchange') renderRecords();
    }

    function switchDay(dayNum, el) {
      document.querySelectorAll('.day-panel').forEach(p => p.classList.remove('active'));
      const target = document.getElementById('day-panel-' + dayNum);
      target.classList.add('active');
      document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      el.scrollIntoView({ behavior: 'smooth', inline: 'center' });
    }// 3. 日文求助數據與邏輯 (3.0 完整版)
    const helpData = {
      shopping: [{ cn: "這多少錢？", jp: "いくらですか？" }, { cn: "我要買這個。", jp: "これをください。" }, { cn: "可以刷卡嗎？", jp: "カードは使えますか？" }],
      tax: [{ cn: "可以退稅嗎？", jp: "免税はできますか？" }, { cn: "請幫我退稅。", jp: "免税をお願いします。" }],
      food: [{ cn: "有中文菜單嗎？", jp: "中国語メニューはありますか？" }, { cn: "結帳。", jp: "お会計をお願いします。" }],
      find: [{ cn: "洗手間在哪？", jp: "トイレはどこですか？" }, { cn: "地鐵站在哪？", jp: "駅はどこですか？" }],
      sos: [{ cn: "我不舒服。", jp: "気分が悪いです。" }, { cn: "請幫幫我。", jp: "助けてください。" }],
      polite: [{ cn: "謝謝。", jp: "ありがとうございます。" }, { cn: "不好意思。", jp: "すみません。" }]
    };

    function filterHelp(cat, btn) {
      if(btn) {
        document.querySelectorAll('.cat-btn').forEach(b => {
          b.classList.remove('bg-pink-500', 'text-white');
          b.classList.add('bg-white', 'text-pink-500');
        });
        btn.classList.add('bg-pink-500', 'text-white');
      }
      const list = document.getElementById('help-list');
      list.innerHTML = helpData[cat].map(item => `
        <div class="card-v2 flex justify-between items-center py-5 mb-3" style="margin: 0 10px 15px">
          <div><p class="font-bold text-xl">${item.jp}</p><p class="text-sm text-pink-500 mt-1">${item.cn}</p></div>
          <button class="w-12 h-12 bg-pink-100 text-pink-500 rounded-full flex items-center justify-center text-xl" onclick="playJP('${item.jp}')"><i class="fas fa-volume-up"></i></button>
        </div>
      `).join('');
    }

    function playJP(text) {
      window.speechSynthesis.cancel();
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = 'ja-JP'; msg.rate = 0.8;
      window.speechSynthesis.speak(msg);
    }

    // 4. 記帳功能邏輯 (3.0 完整版)
    function selectRecordCat(icon, name, el) {
      selectedCat = { icon, name };
      document.querySelectorAll('.cat-item').forEach(item => item.classList.remove('active'));
      el.classList.add('active');
    }

    function addRecord() {
      const name = document.getElementById('rec-name').value || '項目';
      const price = parseFloat(document.getElementById('rec-price').value);
      const curr = document.getElementById('rec-currency').value;
      if (!price) return;
      const twPrice = curr === 'JPY' ? Math.round(price * EXCHANGE_RATE) : price;
      records.unshift({ id: Date.now(), icon: selectedCat.icon, cat: selectedCat.name, name, tw: twPrice, orig: price, curr });
      localStorage.setItem('tokyo_records', JSON.stringify(records));
      renderRecords();
      document.getElementById('rec-name').value = ''; 
      document.getElementById('rec-price').value = '';
    }

    function deleteRecord(id) {
      records = records.filter(r => r.id !== id);
      localStorage.setItem('tokyo_records', JSON.stringify(records));
      renderRecords();
    }

    function renderRecords() {
      const list = document.getElementById('record-list');
      if(!list) return;
      let total = 0;
      list.innerHTML = records.map(r => {
        total += r.tw;
        return `
          <div class="card-v2 flex justify-between items-center py-4 mb-3" style="margin: 0 0 15px 0;">
            <div class="flex items-center">
              <span class="text-3xl mr-4">${r.icon}</span>
              <div><p class="font-bold text-gray-700">${r.name}</p><p class="text-xs text-gray-400">${r.cat} | ${r.curr === 'JPY' ? '¥'+r.orig : '$'+r.orig}</p></div>
            </div>
            <div class="text-right"><p class="text-pink-600 font-black text-lg">NT$ ${r.tw}</p><button onclick="deleteRecord(${r.id})" class="text-gray-300 text-xs">刪除</button></div>
          </div>`;
      }).join('');
      document.getElementById('total-sum').innerText = `NT$ ${total.toLocaleString()}`;
    }

    // 5. 初始化與監聽
    document.getElementById('jpy-input').addEventListener('input', (e) => {
      document.getElementById('tw-result').innerText = `約 NT$ ${Math.round(e.target.value * EXCHANGE_RATE).toLocaleString()} 元`;
    });

    function initCountdown() {
      const target = new Date('2026-04-04T00:00:00').getTime();
      const el = document.getElementById('countdown');
      setInterval(() => {
        const diff = target - new Date().getTime();
        el.innerText = diff < 0 ? "旅行中" : `出發倒數 ${Math.floor(diff / (1000*60*60*24))} 天`;
      }, 1000);
    }

    window.onload = () => { initCountdown(); renderRecords(); };
</script>
</body>
</html>
