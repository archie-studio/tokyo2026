<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>🌸 2026 東京櫻花探險</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=Zhi_Mang_Xing&display=swap" rel="stylesheet">

  <style>
    :root { --sakura-pink: #ffb7c5; --deep-pink: #ff758c; --soft-bg: #fff5f7; }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--soft-bg); padding-bottom: 120px; overflow-x: hidden; }
    
    /* 頂部 Header */
    .hero-header { background: linear-gradient(135deg, #ffdeed 0%, #fff1eb 100%); border-radius: 0 0 40px 40px; padding: 45px 20px 25px; text-align: center; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .header-logo { width: 75px; height: 75px; background: white; border-radius: 50%; margin: 0 auto 10px; padding: 10px; box-shadow: 0 8px 15px rgba(255,182,193,0.3); }

    /* --- App 感轉場動畫定義 --- */
    @keyframes appSlideFade {
      from { 
        opacity: 0; 
        transform: translateY(20px); /* 從下方滑上來 */
        filter: blur(4px); /* 初始模糊增加柔和感 */
      }
      to { 
        opacity: 1; 
        transform: translateY(0); 
        filter: blur(0);
      }
    }

    /* 分頁主內容動畫 */
    .tab-content { display: none; }
    .tab-content.active { 
      display: block; 
      animation: appSlideFade 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards; 
    }

    /* 行程面板與求助清單動畫 */
    .day-panel { display: none; }
    .day-panel.active { 
      display: block; 
      animation: appSlideFade 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards; 
    }

    .help-item {
      animation: appSlideFade 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    /* ------------------------ */

    /* 天數選擇器（膠囊型） */
    .day-selector { display: flex; overflow-x: auto; gap: 12px; padding: 20px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .day-selector::-webkit-scrollbar { display: none; }
    .day-btn { flex: 0 0 auto; width: 75px; height: 55px; border-radius: 25px; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid rgba(255,117,140,0.1); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .day-btn.active { background: var(--deep-pink); color: white; transform: translateY(-3px); box-shadow: 0 8px 15px rgba(255,117,140,0.3); border: none; }

    /* 行程細節 */
    .card-v2 { background: white; border-radius: 25px; box-shadow: 0 8px 20px rgba(255,182,193,0.12); margin: 0 20px 15px; padding: 22px; border: 1px solid rgba(255,117,140,0.05); }
    .time-pill { background: #fdf2f4; color: var(--deep-pink); padding: 2px 12px; border-radius: 12px; font-weight: 700; font-size: 0.8rem; margin-right: 12px; }

    /* 語音分類標籤 */
    .category-scroll { display: flex; overflow-x: auto; gap: 10px; padding: 15px 20px; scrollbar-width: none; }
    .cat-btn { flex: 0 0 auto; padding: 8px 18px; border-radius: 20px; background: white; border: 1px solid var(--sakura-pink); color: var(--deep-pink); font-weight: bold; font-size: 14px; transition: 0.3s; }
    .cat-btn.active { background: var(--deep-pink); color: white; border: none; }

    /* 語音按鈕 */
    .speak-btn { background: var(--sakura-pink); color: white; width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .speak-btn:active { background: var(--deep-pink); transform: scale(0.9); }

    /* 導覽列 */
    .nav-bar { background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-top: 1px solid rgba(255,182,193,0.2); }
    .nav-item { color: #ccc; transition: 0.3s; }
    .nav-item.active { color: var(--deep-pink); }
  </style>
</head>
<body>

  <div class="hero-header">
    <div id="countdown" class="absolute top-6 right-6 text-[10px] bg-white/80 px-3 py-1 rounded-full text-pink-500 font-bold tracking-wider"></div>
    <img src="https://image2url.com/r2/default/images/1772407854647-3d653eed-adf6-4e35-8c39-0fea89d1df0c.png" class="header-logo">
    <h1 class="text-xl font-bold text-pink-700 font-['Zhi_Mang_Xing']">2026 東京櫻花探險</h1>
  </div>

  <div id="tab-schedule" class="tab-content active">
    <div class="day-selector">
      <button class="day-btn active" onclick="switchDay(1, this)"><span class="text-[10px]">（六）</span><span class="text-lg font-bold">4/4</span></button>
      <button class="day-btn" onclick="switchDay(2, this)"><span class="text-[10px]">（日）</span><span class="text-lg font-bold">4/5</span></button>
      <button class="day-btn" onclick="switchDay(3, this)"><span class="text-[10px]">（一）</span><span class="text-lg font-bold">4/6</span></button>
      <button class="day-btn" onclick="switchDay(4, this)"><span class="text-[10px]">（二）</span><span class="text-lg font-bold">4/7</span></button>
      <button class="day-btn" onclick="switchDay(5, this)"><span class="text-[10px]">（三）</span><span class="text-lg font-bold">4/8</span></button>
      <button class="day-btn" onclick="switchDay(6, this)"><span class="text-[10px]">（四）</span><span class="text-lg font-bold">4/9</span></button>
    </div>

    <div id="schedule-panels">
      <div id="day-panel-1" class="day-panel active">
        <div class="card-v2">
          <h3 class="text-lg font-bold text-pink-600 mb-6 border-b border-pink-50 pb-2">🌸 Day 1：啟程</h3>
          <div class="space-y-6 text-sm">
            <div class="flex items-start"><span class="time-pill">10:40</span><div><p class="font-bold">桃園機場起飛</p><p class="text-xs text-gray-400">星宇航空 JX802</p></div></div>
            <div class="flex items-start"><span class="time-pill">15:05</span><div><p class="font-bold">抵達成田二航廈</p></div></div>
            <div class="flex items-start"><span class="time-pill">17:30</span><div><p class="font-bold text-pink-600">入住：市川 R9 飯店</p></div></div>
          </div>
        </div>
      </div>
      <div id="day-panel-2" class="day-panel">
        <div class="card-v2">
          <h3 class="text-lg font-bold text-pink-600 mb-6 border-b border-pink-50 pb-2">🌸 Day 2：賞櫻</h3>
          <div class="space-y-6 text-sm">
            <div class="flex items-start"><span class="time-pill">10:30</span><p class="font-bold">中目黑：目黑川賞櫻隧道</p></div>
            <div class="flex items-start"><span class="time-pill">18:30</span><p class="font-bold">淺草寺參拜與雷門夜櫻</p></div>
          </div>
        </div>
      </div>
      <div id="day-panel-3" class="day-panel">
        <div class="card-v2">
          <h3 class="text-lg font-bold text-pink-600 mb-6 border-b border-pink-50 pb-2">🌸 Day 3：散策</h3>
          <div class="space-y-6 text-sm">
            <div class="flex items-start"><span class="time-pill">11:00</span><p class="font-bold">明治神宮與原宿散步</p></div>
            <div class="flex items-start"><span class="time-pill">16:00</span><p class="font-bold">澀谷十字路口、忠犬小八</p></div>
          </div>
        </div>
      </div>
      <div id="day-panel-4" class="day-panel"><div class="card-v2 text-center py-10 text-gray-400">Day 4 行程內容規劃中</div></div>
      <div id="day-panel-5" class="day-panel"><div class="card-v2 text-center py-10 text-gray-400">Day 5 行程內容規劃中</div></div>
      <div id="day-panel-6" class="day-panel"><div class="card-v2 text-center py-10 text-gray-400">Day 6 準備返台</div></div>
    </div>
  </div>

  <div id="tab-help" class="tab-content">
    <div class="category-scroll">
      <button class="cat-btn active" onclick="filterHelp('shopping', this)">🛍️ 購物</button>
      <button class="cat-btn" onclick="filterHelp('tax', this)">💰 退稅</button>
      <button class="cat-btn" onclick="filterHelp('food', this)">🍜 點餐</button>
      <button class="cat-btn" onclick="filterHelp('find', this)">🚻 設施</button>
      <button class="cat-btn" onclick="filterHelp('sos', this)">🚑 緊急</button>
      <button class="cat-btn" onclick="filterHelp('polite', this)">🤝 禮貌</button>
    </div>
    <div id="help-list" class="mt-2"></div>
  </div>

  <div id="tab-exchange" class="tab-content">
    <div class="card-v2 mt-10 text-center">
      <h3 class="text-lg font-bold mb-4">💴 匯率換算 (0.21)</h3>
      <input type="number" id="jpy-input" placeholder="輸入日幣金額" class="w-full p-4 border rounded-2xl text-center text-xl mb-4 shadow-inner">
      <div id="tw-result" class="text-2xl font-black text-pink-600">約 NT$ 0 元</div>
    </div>
  </div>

  <nav class="nav-bar fixed bottom-0 w-full flex justify-around py-4 pb-8 z-50">
    <div onclick="switchTab('schedule', this)" class="nav-item active flex flex-col items-center">
      <i class="fas fa-calendar-alt text-2xl"></i><span class="text-[10px] font-bold mt-1">行程表</span>
    </div>
    <div onclick="switchTab('help', this)" class="nav-item flex flex-col items-center">
      <i class="fas fa-comment-dots text-2xl"></i><span class="text-[10px] font-bold mt-1">日文求助</span>
    </div>
    <div onclick="switchTab('exchange', this)" class="nav-item flex flex-col items-center">
      <i class="fas fa-coins text-2xl"></i><span class="text-[10px] font-bold mt-1">匯率</span>
    </div>
    <div onclick="window.open('https://line.me/')" class="nav-item flex flex-col items-center text-gray-300">
      <i class="fab fa-line text-2xl"></i><span class="text-[10px] font-bold mt-1">找領隊</span>
    </div>
  </nav>

  <script>
    const helpData = {
      shopping: [
        { cn: "這個多少錢？", jp: "這是多少錢？", jpText: "これはいくらですか？" },
        { cn: "我要買這個。", jp: "我要買這個。", jpText: "これをください。" },
        { cn: "可以刷卡嗎？", jp: "可以刷卡嗎？", jpText: "クレジットカードは使えますか？" },
        { cn: "請給我收據。", jp: "請給我收據。", jpText: "領収書をお願いします。" },
        { cn: "請給我袋子。", jp: "請給我袋子。", jpText: "袋をお願いします。" }
      ],
      tax: [
        { cn: "請問可以退稅嗎？", jp: "請問可以退稅嗎？", jpText: "免税はできますか？" },
        { cn: "要在哪裡辦理退稅？", jp: "要在哪裡辦理退稅？", jpText: "免税の手続きはどこですか？" },
        { cn: "請幫我辦理退稅。", jp: "請幫我辦理退稅。", jpText: "免税の手続きをお願いします。" },
        { cn: "可以用這張優惠券嗎？", jp: "可以用這張優惠券嗎？", jpText: "このクーポンは使えますか？" },
        { cn: "請給我新的。", jp: "請給我新的。", jpText: "新しいものはありますか？" }
      ],
      food: [
        { cn: "請問有中文菜單嗎？", jp: "請問有中文菜單嗎？", jpText: "中国語のメニューはありますか？" },
        { cn: "推薦的菜色是什麼？", jp: "推薦的菜色是什麼？", jpText: "おすすめは何ですか？" },
        { cn: "請給我熱水。", jp: "請給我熱水。", jpText: "お湯をいただけますか？" },
        { cn: "結帳。", jp: "結帳。", jpText: "お会計をお願いします。" }
      ],
      find: [
        { cn: "請問洗手間在哪裡？", jp: "請問洗手間在哪裡？", jpText: "お手洗いはどこですか？" },
        { cn: "請問電梯在哪裡？", jp: "請問電梯在哪裡？", jpText: "エレベーターはどこですか？" },
        { cn: "請問這裡有免費 Wi-Fi 嗎？", jp: "請問這裡有免費 Wi-Fi 嗎？", jpText: "無料Wi-Fiはありますか？" }
      ],
      sos: [
        { cn: "我不舒服，請幫幫我。", jp: "我不舒服，請幫幫我。", jpText: "気分が悪いです。助けてください。" },
        { cn: "我對食物/藥物過敏。", jp: "我對食物/藥物過敏。", jpText: "私はアレルギーがあります。" },
        { cn: "請幫我叫救護車。", jp: "請幫我叫救護車。", jpText: "救急車を呼んでください。" }
      ],
      polite: [
        { cn: "謝謝。", jp: "謝謝。", jpText: "ありがとうございます。" },
        { cn: "不好意思。", jp: "不好意思。", jpText: "すみません。" },
        { cn: "不用了，謝謝。", jp: "不用了，謝謝。", jpText: "結構です、ありがとう。" }
      ]
    };

    // 分頁切換
    function switchTab(tabId, el) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + tabId).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      el.classList.add('active');
      if(tabId === 'help') filterHelp('shopping', document.querySelector('.cat-btn'));
    }

    // 行程天數切換
    function switchDay(dayNum, el) {
      const panels = document.querySelectorAll('.day-panel');
      panels.forEach(p => p.classList.remove('active'));
      
      const targetPanel = document.getElementById('day-panel-' + dayNum);
      targetPanel.classList.add('active');
      
      document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      el.scrollIntoView({ behavior: 'smooth', inline: 'center' });
    }

    // 求助分類切換
    function filterHelp(cat, btn) {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const list = document.getElementById('help-list');
      
      // 重新生成內容以觸發動畫
      const items = helpData[cat].map(item => `
        <div class="card-v2 help-item flex justify-between items-center">
          <div><p class="font-bold">${item.jpText}</p><p class="text-xs text-pink-500 mt-1">${item.cn}</p></div>
          <button class="speak-btn" onclick="playJP('${item.jpText}')"><i class="fas fa-volume-up"></i></button>
        </div>
      `).join('');
      list.innerHTML = items;
    }

    function playJP(text) {
      window.speechSynthesis.cancel();
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = 'ja-JP';
      msg.rate = 0.85;
      window.speechSynthesis.speak(msg);
    }

    function initCountdown() {
      const target = new Date('2026-04-04T00:00:00').getTime();
      const el = document.getElementById('countdown');
      setInterval(() => {
        const diff = target - new Date().getTime();
        el.innerText = diff < 0 ? "旅行中" : `出發倒數 ${Math.floor(diff / (1000*60*60*24))} 天`;
      }, 1000);
    }

    document.getElementById('jpy-input')?.addEventListener('input', (e) => {
      document.getElementById('tw-result').innerText = `約 NT$ ${Math.round(e.target.value * 0.21)} 元`;
    });

    window.onload = () => {
      initCountdown();
      filterHelp('shopping', document.querySelector('.cat-btn'));
    };
  </script>
</body>
</html>
